<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe Recommender</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center">🍽 Recipe Recommender</h1>

    <div class="mb-3">
        <label for="ingredients" class="form-label">Ingredients</label>
        <input type="text" id="ingredients" class="form-control" placeholder="e.g. chicken, rice">
    </div>

    <div class="mb-3">
        <label for="diet" class="form-label">Diet</label>
        <select id="diet" class="form-select">
            <option value="">None</option>
            <option value="vegetarian">Vegetarian</option>
            <option value="vegan">Vegan</option>
            <option value="gluten free">Gluten Free</option>
        </select>
    </div>

    <button class="btn btn-primary" onclick="getRecipes()">Search</button>

    <div id="results" class="mt-4"></div>
</div>

<script src="app.js"></script>
</body>
</html>
